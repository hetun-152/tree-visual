<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈夫曼树构建过程可视化</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { display: flex; gap: 20px; }
        .controls { width: 300px; }
        #treeCanvas { border: 1px solid #ccc; background: #f9f9f9; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        .step-log { margin-top: 20px; padding: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <h1>哈夫曼树构建过程可视化</h1>
    <div class="container">
        <div class="controls">
            <h3>控制区</h3>
            <p>输入字符与频率（格式：a:5,b:7,c:2,d:9）：</p>
            <input type="text" id="freqInput" value="a:5,b:7,c:2,d:9" style="width: 100%;">
            <br>
            <button onclick="initTree()">初始化树</button>
            <button onclick="nextStep()">下一步</button>
            <button onclick="resetSteps()">重置</button>
            <div class="step-log">
                <h4>步骤日志</h4>
                <div id="log"></div>
            </div>
        </div>
        <canvas id="treeCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        let nodes = [];
        let steps = [];
        let currentStep = 0;
        let ctx = document.getElementById('treeCanvas').getContext('2d');
        const nodeRadius = 25;

        // 哈夫曼树节点类
        class HuffmanNode {
            constructor(char, freq) {
                this.char = char;
                this.freq = freq;
                this.left = null;
                this.right = null;
                this.x = 0;
                this.y = 0;
            }
        }

        // 初始化哈夫曼树节点
        function initTree() {
            const input = document.getElementById('freqInput').value;
            const pairs = input.split(',');
            nodes = [];
            steps = [];
            currentStep = 0;
            document.getElementById('log').innerHTML = '';

            pairs.forEach(pair => {
                const [char, freq] = pair.split(':');
                nodes.push(new HuffmanNode(char, parseInt(freq)));
            });

            // 记录初始状态
            steps.push({ nodes: [...nodes.map(n => new HuffmanNode(n.char, n.freq))], action: "初始化叶子节点" });
            drawTree();
            logStep("初始化完成，叶子节点：" + nodes.map(n => `${n.char}(${n.freq})`).join(', '));
        }

        // 哈夫曼树构建单步执行
        function nextStep() {
            if (nodes.length <= 1) {
                logStep("构建完成！哈夫曼树已生成。");
                return;
            }

            // 按频率升序排序
            nodes.sort((a, b) => a.freq - b.freq);

            // 取出两个最小频率节点合并
            const left = nodes.shift();
            const right = nodes.shift();
            const newNode = new HuffmanNode(null, left.freq + right.freq);
            newNode.left = left;
            newNode.right = right;
            nodes.push(newNode);

            // 记录步骤
            steps.push({ 
                nodes: [...nodes.map(n => new HuffmanNode(n.char, n.freq))], 
                action: `合并 ${left.char || left.freq}(${left.freq}) 和 ${right.char || right.freq}(${right.freq}) → 父节点(${newNode.freq})` 
            });

            drawTree();
            logStep(`第${currentStep + 1}步：合并 ${left.char || left.freq}(${left.freq}) 和 ${right.char || right.freq}(${right.freq})，新节点频率：${newNode.freq}`);
            currentStep++;
        }

        // 绘制哈夫曼树
        function drawTree() {
            ctx.clearRect(0, 0, 800, 600);
            if (nodes.length === 0) return;

            // 计算节点位置（简化布局）
            const root = nodes.length === 1 ? nodes[0] : null;
            if (root) {
                calculatePosition(root, 400, 50, 180);
                drawNode(root);
            } else {
                // 绘制当前所有独立节点
                nodes.forEach((node, i) => {
                    node.x = 100 + i * 150;
                    node.y = 300;
                    drawNode(node);
                });
            }
        }

        // 递归计算节点位置
        function calculatePosition(node, x, y, offset) {
            if (!node) return;
            node.x = x;
            node.y = y;
            if (node.left) calculatePosition(node.left, x - offset, y + 100, offset / 2);
            if (node.right) calculatePosition(node.right, x + offset, y + 100, offset / 2);
        }

        // 绘制单个节点和连线
        function drawNode(node) {
            ctx.beginPath();
            ctx.arc(node.x, node.y, nodeRadius, 0, Math.PI * 2);
            ctx.fillStyle = node.char ? "#4CAF50" : "#2196F3";
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(node.char ? `${node.char}:${node.freq}` : node.freq, node.x, node.y);

            // 绘制子节点连线
            if (node.left) {
                ctx.beginPath();
                ctx.moveTo(node.x, node.y + nodeRadius);
                ctx.lineTo(node.left.x, node.left.y - nodeRadius);
                ctx.stroke();
                drawNode(node.left);
            }
            if (node.right) {
                ctx.beginPath();
                ctx.moveTo(node.x, node.y + nodeRadius);
                ctx.lineTo(node.right.x, node.right.y - nodeRadius);
                ctx.stroke();
                drawNode(node.right);
            }
        }

        // 步骤日志记录
        function logStep(text) {
            const logDiv = document.getElementById('log');
            const p = document.createElement('p');
            p.textContent = text;
            logDiv.appendChild(p);
        }

        // 重置所有步骤
        function resetSteps() {
            initTree();
        }

        // 页面加载时初始化
        window.onload = initTree;
    </script>
</body>
</html>
